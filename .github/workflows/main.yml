name: Build & Release APK (Flutter 3.41.2, auto tag)

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # QUAN TRỌNG: Thêm Java 17 để chạy được Desugaring cho ota_update
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Set build number
        run: echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Build APK
        run: flutter build apk --release --build-number=${GITHUB_RUN_NUMBER}

      # Sign APK với Keystore từ Secrets
      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          # Lưu ý: Nếu bạn đổi buildDir trong Gradle, hãy kiểm tra kỹ đường dẫn này
          releaseDirectory: build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Read version from pubspec.yaml
        id: read_version
        run: |
          MAIN_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release with tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.MAIN_VERSION }}+${{ github.run_number }}"
          name: "v${{ env.MAIN_VERSION }}+${{ github.run_number }}"
          body: "Commit message: ${{ github.event.head_commit.message }}"
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
