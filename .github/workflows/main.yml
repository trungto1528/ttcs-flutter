name: Build & Release APK (Release tag with time)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4️⃣ Build APK release
      - name: Build APK
        run: flutter build apk --release

      # 5️⃣ Get main version from pubspec.yaml
      - name: Read version from pubspec.yaml
        id: read_version
        run: |
          MAIN_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV
          echo "Main version: $MAIN_VERSION"

      # 6️⃣ Generate timestamp for tag
      - name: Generate timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d%H%M')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # 7️⃣ Create GitHub Tag with time
      - name: Create GitHub Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v${MAIN_VERSION}-${TIMESTAMP}"
          git tag -a "$TAG" -m "Auto tag $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${MAIN_VERSION}-${TIMESTAMP}"
          name: "v${MAIN_VERSION}-${TIMESTAMP}"
          body: "Auto build APK version ${MAIN_VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9️⃣ Upload APK to Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
