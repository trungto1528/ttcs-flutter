name: Build & Release APK (Flutter 3.41.2, auto tag)

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter 3.41.2
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4️⃣ Build APK release (Hiện tại tạo ra app-release.apk chưa ký chính thức)
      - name: Build APK
        run: flutter build apk --release

      # ⚠️ BƯỚC MỚI: Sign APK với Keystore từ Secrets
      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 5️⃣ Lấy version chính từ pubspec.yaml
      - name: Read version from pubspec.yaml
        id: read_version
        run: |
          MAIN_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV
          echo "Main version: $MAIN_VERSION"

      # 6️⃣ Tạo timestamp cho tag
      - name: Generate timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y_%m_%d_%H_%M_UTC')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # 7️⃣ Tạo Release + tag tự động, upload APK ĐÃ KÝ
      - name: Create GitHub Release with tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.MAIN_VERSION }}-${{ env.TIMESTAMP }}"
          name: "v${{ env.MAIN_VERSION }}-${{ env.TIMESTAMP }}"
          body: "Commit message: ${{ github.event.head_commit.message }}"
          # Quan trọng: Sử dụng output từ bước Sign thay vì đường dẫn cứng
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
