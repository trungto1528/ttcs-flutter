name: Build & Release Split APK (Flutter 3.41.2)

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Java 17 để tương thích với các thư viện OTA và build tools mới
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      - name: Install dependencies
        run: flutter pub get

      # Lấy số version từ pubspec.yaml (ví dụ 1.0.0)
      - name: Read version from pubspec.yaml
        id: read_version
        run: |
          MAIN_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV

      # BUILD SPLIT APK: Tách riêng các file theo cấu trúc CPU (arm64, v7a, x86)
      - name: Build APK
        run: flutter build apk --release --split-per-abi --build-number=${GITHUB_RUN_NUMBER}

      # Ký toàn bộ các file APK đã tách
      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Upload TẤT CẢ các bản APK đã ký lên GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.MAIN_VERSION }}+${{ github.run_number }}"
          name: "v${{ env.MAIN_VERSION }}+${{ github.run_number }}"
          body: |
            ## Automated Release
            - **Version:** ${{ env.MAIN_VERSION }}
            - **Build Number:** ${{ github.run_number }}
            - **Commit:** ${{ github.event.head_commit.message }}
            
            *Lưu ý: Vui lòng chọn đúng bản APK phù hợp với kiến trúc CPU của thiết bị.*
          # Wildcard '*' giúp lấy tất cả các bản v7a, arm64, x86 đã ký
          files: build/app/outputs/flutter-apk/*-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
